<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Farouk El Hammoumi rocket launch base portfolio." />
    <title>Farouk El Hammoumi | Rocket Launch Portfolio</title>
    <link rel="stylesheet" href="./styles.css?v=rocket-lightspeed-tunnel-1" />
  </head>
  <body>
    <main id="app-shell">
      <canvas id="scene-canvas" aria-label="Interactive 3D rocket launch portfolio"></canvas>
      <div class="atmosphere" aria-hidden="true"></div>
      <div class="scanline" aria-hidden="true"></div>
      <div id="warp-overlay" class="warp-overlay" aria-hidden="true">
        <div class="warp-vignette" aria-hidden="true"></div>
        <div class="warp-dust" aria-hidden="true"></div>
        <div class="warp-streaks warp-streaks-primary" aria-hidden="true"></div>
        <div class="warp-streaks warp-streaks-secondary" aria-hidden="true"></div>
        <div class="warp-core" aria-hidden="true"></div>
        <p id="warp-status">Jumping to launch base</p>
      </div>

      <section id="launch-intro" class="launch-intro hidden" aria-hidden="true">
        <p id="module-fallback" class="module-fallback">
          Open this portfolio through GitHub Pages or a local server so the 3D control room can load.
        </p>
      </section>

      <header class="top-hud">
        <div>
          <p class="eyebrow">Launch Base Portfolio</p>
          <h1>Farouk El Hammoumi</h1>
        </div>
        <p class="skill-strip">Python / SQL / JavaScript</p>
      </header>

      <nav class="section-dock" aria-label="Portfolio sections">
        <button class="dock-button active" type="button" data-section="home"><span>Home</span></button>
        <button class="dock-button" type="button" data-section="about"><span>About</span></button>
        <button class="dock-button" type="button" data-section="projects"><span>Projects</span></button>
        <button class="dock-button" type="button" data-section="skills"><span>Skills</span></button>
        <button class="dock-button" type="button" data-section="experience"><span>Experience</span></button>
        <button class="dock-button" type="button" data-section="contact"><span>Contact</span></button>
      </nav>

      <aside id="section-panel" class="section-panel" aria-live="polite" aria-hidden="true">
        <div class="panel-header">
          <div>
            <p id="panel-kicker" class="panel-kicker">Selected Rocket</p>
            <h2 id="panel-title">Home Rocket</h2>
          </div>
          <button id="close-panel" class="icon-button" type="button" aria-label="Return to full launch base">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <div id="panel-content" class="panel-content"></div>
      </aside>

      <div id="loading" class="loading" role="status">Launch base online</div>
    </main>
    <script>
      window.__portfolioBooted = false;
      window.setTimeout(() => {
        if (!window.__portfolioBooted) document.body.classList.add("module-failed");
      }, 3200);
    </script>
    <script type="module" src="./main.js?v=rocket-lightspeed-tunnel-1"></script>
  </body>
</html>
